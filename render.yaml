# ─────────────────────────────────────────────────────────────────────────────
# DevCollab — render.yaml  (Render Blueprint)
#
# This file defines ALL Render services as code.
# Commit it to your repo root — Render reads it automatically.
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── Backend Web Service ─────────────────────────────────────────────────────
  - type: web
    name: devcollab-backend
    runtime: docker
    dockerfilePath: apps/backend/Dockerfile
    dockerContext: .
    plan: free             # Free tier
    region: singapore      
    branch: main
    autoDeploy: true
    healthCheckPath: /api/health

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"

      # ── Database — auto-linked from the postgres service below ────────────
      - key: DATABASE_URL
        fromDatabase:
          name: devcollab-postgres
          property: connectionString

      # ── Redis — auto-linked from the redis service below ──────────────────
      - key: REDIS_URL
        fromService:
          name: devcollab-redis
          type: redis
          property: connectionString

      # ── Secrets — sync:false means you set these in the dashboard ─────────
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-3-flash-preview
      - key: GEMINI_FALLBACK_MODEL
        value: gemini-3.1-flash-lite
      - key: AI_MOCK_MODE
        value: "false"
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false

  # ── Redis ───────────────────────────────────────────────────────────────────
  - type: redis
    name: devcollab-redis
    plan: free                     # <--- Fixed: Using Render's Free tier
    region: singapore
    maxmemoryPolicy: allkeys-lru   
    ipAllowList: []

# ── PostgreSQL ─────────────────────────────────────────────────────────────────
databases:
  - name: devcollab-postgres
    databaseName: devcollab
    user: devcollab
    plan: free                     # <--- Fixed: Using Render's Free tier
    region: singapore
