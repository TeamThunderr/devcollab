# ─────────────────────────────────────────────────────────────────────────────
# DevCollab — render.yaml  (Render Blueprint)
#
# This file deploys ONLY the backend web service on Render (free tier).
# PostgreSQL and Redis are hosted externally for free — no credit card needed:
#
#   PostgreSQL → Supabase free tier  (supabase.com — no card required)
#   Redis      → Upstash free tier   (upstash.com  — no card required)
#
# After setting up Supabase and Upstash, paste their connection URLs
# into the Render dashboard → Service → Environment tab.
# ─────────────────────────────────────────────────────────────────────────────

services:
  - type: web
    name: devcollab-backend
    runtime: docker
    dockerfilePath: apps/backend/Dockerfile
    dockerContext: .
    plan: free             # Free tier — no credit card required
    region: singapore      # Closest to India — options: oregon, ohio, frankfurt
    branch: main
    autoDeploy: true
    healthCheckPath: /api/health

    envVars:
      # ── Server ────────────────────────────────────────────────────────────
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"     # Render free tier assigns port 10000

      # ── Database (Supabase) ───────────────────────────────────────────────
      # Get from: supabase.com → Project → Settings → Database → Connection string
      # Use the "URI" format: postgresql://postgres:[PASSWORD]@db.[ref].supabase.co:5432/postgres
      - key: DATABASE_URL
        sync: false

      # ── Redis (Upstash) ───────────────────────────────────────────────────
      # Get from: upstash.com → Database → Details → REDIS_URL
      # Format: rediss://:[PASSWORD]@[host].upstash.io:6379
      - key: REDIS_URL
        sync: false

      # ── Auth secrets ──────────────────────────────────────────────────────
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false

      # ── CORS ──────────────────────────────────────────────────────────────
      - key: FRONTEND_URL
        sync: false

      # ── AI ────────────────────────────────────────────────────────────────
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-3-flash-preview
      - key: GEMINI_FALLBACK_MODEL
        value: gemini-3.1-flash-lite
      - key: AI_MOCK_MODE
        value: "false"

      # ── Payments ──────────────────────────────────────────────────────────
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false

      # ── Email ─────────────────────────────────────────────────────────────
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
