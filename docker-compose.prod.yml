# ─────────────────────────────────────────────────────────────────────────────
# DevCollab — docker-compose.prod.yml
#
# For a FULL self-hosted VPS deployment (all 4 services on one machine).
# For Railway + Vercel deployment, only use backend + postgres + redis.
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Required environment variables (set in .env.production or export them):
#   POSTGRES_PASSWORD  — strong random password
#   REDIS_PASSWORD     — strong random password
#   JWT_SECRET         — 64-char random string
#   JWT_REFRESH_SECRET — 64-char random string
#   GEMINI_API_KEY     — Google AI Studio key
#   FRONTEND_URL       — e.g. https://yourdomain.com
#   VITE_API_URL       — e.g. https://api.yourdomain.com  (or same domain /api)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: devcollab-postgres
    restart: unless-stopped
    # NOT exposed to the host — only reachable inside the devcollab_network
    expose:
      - "5432"
    environment:
      POSTGRES_USER:              devcollab
      POSTGRES_PASSWORD:          ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB:                devcollab
      POSTGRES_INITDB_ARGS:       "--locale=C --encoding=UTF8"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - devcollab_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devcollab"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: devcollab-redis
    restart: unless-stopped
    # Require password + disable dangerous commands
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      --rename-command FLUSHALL ""
      --rename-command FLUSHDB  ""
      --rename-command DEBUG    ""
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    expose:
      - "6379"
    volumes:
      - redisdata:/data
    networks:
      - devcollab_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Backend (Fastify + Node.js) ────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      # Use --target runner to skip dev stages
      target: runner
    image: devcollab-backend:latest
    container_name: devcollab-backend
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NODE_ENV:               production
      PORT:                   3000
      DATABASE_URL:           postgresql://devcollab:${POSTGRES_PASSWORD}@postgres:5432/devcollab
      REDIS_URL:              redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET:             ${JWT_SECRET:?JWT_SECRET is required}
      JWT_REFRESH_SECRET:     ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      FRONTEND_URL:           ${FRONTEND_URL:?FRONTEND_URL is required}
      GEMINI_API_KEY:         ${GEMINI_API_KEY}
      GEMINI_MODEL:           ${GEMINI_MODEL:-gemini-2.0-flash}
      GEMINI_FALLBACK_MODEL:  ${GEMINI_FALLBACK_MODEL:-gemini-1.5-flash-8b}
      RAZORPAY_KEY_ID:        ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET:    ${RAZORPAY_KEY_SECRET}
      SMTP_HOST:              ${SMTP_HOST}
      SMTP_PORT:              ${SMTP_PORT:-587}
      SMTP_USER:              ${SMTP_USER}
      SMTP_PASS:              ${SMTP_PASS}
      AI_MOCK_MODE:           ${AI_MOCK_MODE:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - devcollab_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    # Limit resources on a shared VPS
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Frontend (nginx serving Vite build) ────────────────────────────────────
  # Only include this service for a self-hosted VPS deployment.
  # For Vercel deployment: remove this service entirely.
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      target: runner
      args:
        # VITE_API_URL is baked into the JS bundle at build time.
        # On VPS (same domain): leave blank — nginx proxies /api to backend.
        # On Vercel + Railway: set to https://your-railway-backend.up.railway.app
        VITE_API_URL: ${VITE_API_URL:-}
    image: devcollab-frontend:latest
    container_name: devcollab-frontend
    restart: unless-stopped
    ports:
      # Expose nginx on port 80. Put a reverse proxy (Caddy/Traefik) in front for SSL.
      - "${NGINX_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - devcollab_network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

# ── Named volumes (data persists across restarts) ──────────────────────────────
volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local

# ── Isolated internal network ─────────────────────────────────────────────────
# Postgres and Redis are ONLY reachable on this network, not the host.
networks:
  devcollab_network:
    driver: bridge
